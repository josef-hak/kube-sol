raw:
  resources:
  # Self-signed CA for private cluster
  - apiVersion: cert-manager.io/v1
    kind: ClusterIssuer
    metadata:
      name: private-issuer
    spec:
      selfSigned: {}

  - apiVersion: cert-manager.io/v1
    kind: Certificate
    metadata:
      name: private-root-ca
      namespace: cert-manager
    spec:
      isCA: true
      commonName: private-root-ca
      secretName: private-root-ca-secret
      duration: 87600h # 10 years
      issuerRef:
        name: private-issuer
        kind: ClusterIssuer

  - apiVersion: cert-manager.io/v1
    kind: ClusterIssuer
    metadata:
      name: private-ca-issuer
    spec:
      ca:
        secretName: private-root-ca-secret

  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: ca-download
      namespace: cert-manager
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: ca-download
      template:
        metadata:
          labels:
            app: ca-download
        spec:
          containers:
            - name: nginx
              image: nginx:alpine
              ports:
                - containerPort: 80
              volumeMounts:
                - name: ca
                  mountPath: /usr/share/nginx/html/private-root-ca.crt
                  subPath: ca.crt
                  readOnly: true
          volumes:
            - name: ca
              secret:
                secretName: private-root-ca-secret

  - apiVersion: v1
    kind: Service
    metadata:
      name: ca-download
      namespace: cert-manager
    spec:
      selector:
        app: ca-download
      ports:
        - name: http
          port: 80
          targetPort: 80

  - apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: ca-download
      namespace: cert-manager
    spec:
      ingressClassName: traefik
      rules:
        - host: ca.MY_SERVER.MY_IP.sslip.io
          http:
            paths:
              - path: /
                pathType: Prefix
                backend:
                  service:
                    name: ca-download
                    port:
                      number: 80