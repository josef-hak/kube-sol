raw:
  resources:
  # Keycloak secrets database secrets
  - apiVersion: v1
    kind: Secret
    metadata:
      name: keycloak-auth
    type: Opaque
    stringData:
      postgresPassword: mainPasswd
      dbPassword: keycloakPasswd
      keycloakAdminUserPassword: Key.Admin1

  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: keycloak-realm
      namespace: keycloak
    data:
      homelab-realm.json: |
        {
          "realm": "homelab",
          "enabled": true,
          "users": [
            {
              "username": "josef",
              "enabled": true,
              "email": "josef@example.com",
              "firstName": "Josef",
              "lastName": "Hak",
              "emailVerified": true,
              "credentials": [
                {
                  "type": "password",
                  "value": "CHANGE_ME",
                  "temporary": true
                }
              ]
            },
            {
